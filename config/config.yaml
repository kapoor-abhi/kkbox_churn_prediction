data_ingestion:
  root_dir: data
  # Official train_v2 alignment:
  # features must be built only from history available on or before
  # February 28, 2017, because the refreshed train_v2 labels describe
  # churn outcomes observed during March 2017.
  cutoff_date_int: 20170228
  cohort_start_date: "2017-02-01"
  cohort_end_date: "2017-02-28"
  # Note the s3:// prefix and the bucket name
  raw_data_dir: s3://kkbox-raw 
  train_data_file: train_v2.csv
  members_data_file: members_v3.csv
  transactions_data_file: transactions_v2.csv
  user_logs_data_file: user_logs_v2.csv
  analysis_dir: data/analysis
